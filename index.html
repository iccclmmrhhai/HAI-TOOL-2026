<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLMMRH HAI Deciphering Suite</title>
    <style>
        :root { --clmmrh-green: #008542; --clmmrh-blue: #0038a8; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .header { background: var(--clmmrh-blue); color: white; padding: 15px; border-radius: 10px 10px 0 0; text-align: center; border-bottom: 5px solid var(--clmmrh-green); }
        .card { background: white; padding: 20px; border-radius: 0 0 10px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .tabs { display: flex; background: #ddd; padding: 5px; gap: 5px; border-radius: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #ccc; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .tab-btn.active { background: var(--clmmrh-blue); color: white; }
        .module-group { border: 1px solid #e0e0e0; padding: 15px; border-radius: 8px; background: #fafafa; margin-top: 10px; }
        label { display: block; font-weight: 600; margin-top: 12px; font-size: 0.85rem; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-top: 5px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 15px; background: var(--clmmrh-green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .result-box { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; border-left: 8px solid; line-height: 1.6; }
        .hai-pos { background: #fff5f5; border-color: #c53030; color: #9b2c2c; }
        .hai-neg { background: #f0fff4; border-color: #38a169; color: #22543d; }
        .hidden { display: none; }
        .summary-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; background: #eee; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">CLMMRH IPC</h2>
        <p style="margin:0; font-size: 0.8rem;">Advanced HAI Classification Tool (NHSN 2026)</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-engine" onclick="showTab('engine')">Decipher</button>
        <button class="tab-btn" id="btn-logs" onclick="showTab('logs')">Case Log</button>
    </div>

    <div id="tab-engine">
        <div class="card">
            <label>Patient Name / Bed Number</label>
            <input type="text" id="ptId" placeholder="e.g. Ward 3 - Bed 12">

            <label>Infection Module</label>
            <select id="module" onchange="updateUI()">
                <option value="BSI">CLABSI (Bloodstream)</option>
                <option value="UTI">CAUTI (Urinary Tract)</option>
                <option value="SSI">SSI (Surgical Site)</option>
                <option value="VAE">VAE (Ventilator)</option>
            </select>

            <label>Hospital Day of Event (Day 1 = Admission)</label>
            <input type="number" id="hospDay" value="3">

            <div id="bsiControls" class="module-group">
                <label>Organism Type</label>
                <select id="bsiType">
                    <option value="pathogen">Recognized Pathogen (1+ culture)</option>
                    <option value="commensal">Common Commensal (2+ matching cultures)</option>
                </select>
                <label>Symptoms (Fever, Chills, Hypotension)</label>
                <select id="bsiSym"><option value="yes">Yes</option><option value="no">No</option></select>
                <label>Central Line in place > 2 days?</label>
                <select id="bsiLine"><option value="yes">Yes</option><option value="no">No</option></select>
            </div>

            <div id="utiControls" class="module-group hidden">
                <label>Urine Culture</label>
                <select id="utiCult">
                    <option value="pos">Positive (≥10^5 CFU/ml with ≤2 species)</option>
                    <option value="neg">Negative or Low Growth</option>
                </select>
                <label>Symptom (Fever >38C, Suprapubic pain, CVA tenderness)</label>
                <select id="utiSym"><option value="yes">Yes</option><option value="no">No</option></select>
                <label>Foley in place > 2 days?</label>
                <select id="utiLine"><option value="yes">Yes</option><option value="no">No</option></select>
            </div>

            <div id="ssiControls" class="module-group hidden">
                <label>Anatomical Depth</label>
                <select id="ssiDepth">
                    <option value="Superficial Incisional">Superficial Incisional</option>
                    <option value="Deep Incisional">Deep Incisional</option>
                    <option value="Organ/Space">Organ/Space</option>
                </select>
                <label>Procedure Type</label>
                <select id="ssiWindow">
                    <option value="30">General Procedure (30-day window)</option>
                    <option value="90">Implant/Major Procedure (90-day window)</option>
                </select>
                <label>Days Since Procedure</label>
                <input type="number" id="ssiDays" value="10">
            </div>

            <div id="vaeControls" class="module-group hidden">
                <label>Oxygenation Deterioration (VAC)</label>
                <select id="vaeVac">
                    <option value="yes">Yes (FiO2 ≥0.20 or PEEP ≥3 for 2+ days)</option>
                    <option value="no">No</option>
                </select>
                <label>Infection Signs (Temp/WBC) + New Antibiotics?</label>
                <select id="vaeIvac"><option value="yes">Yes (IVAC Criteria)</option><option value="no">No</option></select>
                <label>Positive Respiratory Lab/Culture?</label>
                <select id="vaePvap"><option value="yes">Yes (PVAP Criteria)</option><option value="no">No</option></select>
            </div>

            <button onclick="calculate()">Analyze HAI Status</button>

            <div id="result" class="result-box"></div>
        </div>
    </div>

    <div id="tab-logs" class="hidden">
        <div class="card">
            <h3>Recent Case History</h3>
            <div id="logContent"></div>
            <button onclick="exportData()" style="background:#555">Export to Excel (CSV)</button>
        </div>
    </div>
</div>

<script>
    function showTab(tab) {
        document.getElementById('tab-engine').classList.toggle('hidden', tab !== 'engine');
        document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
        document.getElementById('btn-engine').classList.toggle('active', tab === 'engine');
        document.getElementById('btn-logs').classList.toggle('active', tab === 'logs');
        if(tab === 'logs') renderLogs();
    }

    function updateUI() {
        const mod = document.getElementById('module').value;
        document.getElementById('bsiControls').classList.toggle('hidden', mod !== 'BSI');
        document.getElementById('utiControls').classList.toggle('hidden', mod !== 'UTI');
        document.getElementById('ssiControls').classList.toggle('hidden', mod !== 'SSI');
        document.getElementById('vaeControls').classList.toggle('hidden', mod !== 'VAE');
    }

    function calculate() {
        const mod = document.getElementById('module').value;
        const day = parseInt(document.getElementById('hospDay').value);
        let isHai = false;
        let classification = "Negative";
        let rationale = "";

        // 1. Check for POA (Present on Admission)
        if (day <= 2 && mod !== 'SSI') {
            classification = "POA (Present on Admission)";
            rationale = "Event elements occurred on Hospital Day 1 or 2.";
        } else {
            // 2. Module Specific Logic
            if (mod === 'BSI') {
                const type = document.getElementById('bsiType').value;
                const sym = document.getElementById('bsiSym').value === 'yes';
                const line = document.getElementById('bsiLine').value === 'yes';
                if (line) {
                    if (type === 'pathogen') { isHai = true; classification = "LCBI 1 (CLABSI)"; }
                    else if (type === 'commensal' && sym) { isHai = true; classification = "LCBI 2 (CLABSI)"; }
                }
            } 
            else if (mod === 'UTI') {
                const cult = document.getElementById('utiCult').value === 'pos';
                const sym = document.getElementById('utiSym').value === 'yes';
                const line = document.getElementById('utiLine').value === 'yes';
                if (cult && sym && line) { isHai = true; classification = "SUTI 1 (CAUTI)"; }
            }
            else if (mod === 'SSI') {
                const days = parseInt(document.getElementById('ssiDays').value);
                const win = parseInt(document.getElementById('ssiWindow').value);
                const depth = document.getElementById('ssiDepth').value;
                if (days <= win) { isHai = true; classification = "SSI (" + depth + ")"; }
            }
            else if (mod === 'VAE') {
                const vac = document.getElementById('vaeVac').value === 'yes';
                const ivac = document.getElementById('vaeIvac').value === 'yes';
                const pvap = document.getElementById('vaePvap').value === 'yes';
                if (vac && ivac && pvap) { isHai = true; classification = "PVAP (Ventilator)"; }
                else if (vac && ivac) { isHai = true; classification = "IVAC (Ventilator)"; }
                else if (vac) { isHai = true; classification = "VAC (Ventilator)"; }
            }
        }

        const box = document.getElementById('result');
        box.style.display = "block";
        box.className = "result-box " + (isHai ? "hai-pos" : "hai-neg");
        box.innerHTML = `<strong>Final Determination:</strong> ${isHai ? 'HAI POSITIVE' : 'HAI NEGATIVE'}<br>
                         <strong>Classification:</strong> ${classification}<br>
                         <span style="font-size:0.85rem">${rationale}</span>`;
        
        saveLog(classification, isHai ? 'Positive' : 'Negative');
    }

    function saveLog(cls, res) {
        let logs = JSON.parse(localStorage.getItem('clmmrh_audit') || '[]');
        const pt = document.getElementById('ptId').value || "Unknown Patient";
        logs.unshift({ pt, cls, res, date: new Date().toLocaleDateString() });
        localStorage.setItem('clmmrh_audit', JSON.stringify(logs.slice(0, 10)));
    }

    function renderLogs() {
        let logs = JSON.parse(localStorage.getItem('clmmrh_audit') || '[]');
        document.getElementById('logContent').innerHTML = logs.map(l => 
            `<div style="border-bottom:1px solid #eee; padding:10px 0;">
                <strong>${l.pt}</strong> - ${l.cls} (${l.res}) <br><small>${l.date}</small>
            </div>`).join('') || "No cases logged yet.";
    }

    function exportData() {
        let logs = JSON.parse(localStorage.getItem('clmmrh_audit') || '[]');
        let csv = "Patient,Classification,Result,Date\n";
        logs.forEach(l => { csv += `${l.pt},${l.cls},${l.res},${l.date}\n` });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'CLMMRH_Report.csv');
        a.click();
    }
</script>
</body>
</html>
